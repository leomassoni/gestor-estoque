databases:
  - name: gestor-estoque-db
    databaseName: gestor_estoque
    user: gestor_estoque
    plan: free

services:
  - type: web
    name: gestor-estoque
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-estoque-db
          property: connectionString
      - key: NODE_ENV
        value: production
