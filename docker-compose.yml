version: "3.3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: gestor-estoque-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestor_estoque
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
